# Docker Compose example - Full stack application
version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy: &default-deploy
  restart_policy:
    condition: unless-stopped
    delay: 5s
  update_config:
    parallelism: 2
    delay: 10s

services:
  # ---------- PostgreSQL Database ----------
  postgres:
    image: postgres:16-alpine
    container_name: devmedia-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME:-devmedia}
      POSTGRES_USER: ${DB_USER:-devmedia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devmedia} -d ${DB_NAME:-devmedia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging: *default-logging

  # ---------- Redis Cache ----------
  redis:
    image: redis:7-alpine
    container_name: devmedia-cache
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend
    logging: *default-logging

  # ---------- Backend API ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: devmedia-api
    image: devmedia/api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./backend:/app/backend:ro
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: postgresql://${DB_USER:-devmedia}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-devmedia}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      - "${API_PORT:-8000}:8000"
    deploy:
      <<: *default-deploy
      replicas: ${API_REPLICAS:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend
      - frontend
    logging: *default-logging

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:1.25-alpine
    container_name: devmedia-proxy
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    depends_on:
      - api
    networks:
      - frontend
    logging: *default-logging

  # ---------- Adminer (DB Management) ----------
  adminer:
    image: adminer:4.8
    container_name: devmedia-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - backend
    profiles:
      - dev
      - tools

  # ---------- Prometheus (Monitoring) ----------
  prometheus:
    image: prom/prometheus:v2.50
    container_name: devmedia-monitor
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  backend:
    driver: bridge
    internal: false
  frontend:
    driver: bridge
