# YAML example - Kubernetes deployment
---
apiVersion: v1
kind: Namespace
metadata:
  name: devmedia
  labels:
    app: devmedia
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devmedia-config
  namespace: devmedia
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  DB_NAME: "devmedia"
  REDIS_DB: "0"
  LOG_LEVEL: "warn"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "1m"

---
apiVersion: v1
kind: Secret
metadata:
  name: devmedia-secrets
  namespace: devmedia
type: Opaque
stringData:
  DB_PASSWORD: "${DB_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  SENDGRID_API_KEY: "${SENDGRID_API_KEY}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devmedia-api
  namespace: devmedia
  labels:
    app: devmedia
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devmedia
      component: api
  template:
    metadata:
      labels:
        app: devmedia
        component: api
    spec:
      containers:
        - name: api
          image: devmedia/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: devmedia-config
            - secretRef:
                name: devmedia-secrets
          env:
            - name: DB_HOST
              value: devmedia-db
            - name: REDIS_HOST
              value: devmedia-cache
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: devmedia-uploads

---
apiVersion: v1
kind: Service
metadata:
  name: devmedia-api
  namespace: devmedia
  labels:
    app: devmedia
    component: api
spec:
  type: ClusterIP
  selector:
    app: devmedia
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devmedia-ingress
  namespace: devmedia
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - api.devmedia.com
      secretName: devmedia-tls
  rules:
    - host: api.devmedia.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devmedia-api
                port:
                  number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devmedia-api-hpa
  namespace: devmedia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devmedia-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
